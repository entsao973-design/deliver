<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>配送存證管理後台</title>
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#146c63" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="配送存證平台" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="application-name" content="配送存證平台" />
    <link rel="icon" type="image/png" sizes="192x192" href="/static/icons/icon-192.png" />
    <link rel="apple-touch-icon" href="/static/icons/icon-192.png" />
    <link rel="stylesheet" href="/static/styles.css" />
    <link rel="stylesheet" href="/static/admin.css" />
  </head>
  <body>
    <main id="adminLoginScreen" class="app-shell">
      <section class="screen login-screen">
        <div class="brand-block">
          <h1>配送存證管理後台</h1>
          <p>管理者登入</p>
        </div>

        <form id="adminLoginForm" class="panel">
          <label>
            <span>帳號</span>
            <input id="adminLoginUsername" name="username" autocomplete="username" required />
          </label>
          <label>
            <span>密碼</span>
            <div class="password-field">
              <input id="adminLoginPassword" name="password" type="password" autocomplete="current-password" required />
              <button id="adminTogglePassword" class="password-toggle" type="button" aria-label="顯示密碼" aria-pressed="false">
                <svg id="adminPasswordEyeOpen" class="eye-icon eye-open" viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M2.5 12s3.5-6 9.5-6 9.5 6 9.5 6-3.5 6-9.5 6-9.5-6-9.5-6Z"></path>
                  <circle cx="12" cy="12" r="3"></circle>
                </svg>
                <svg id="adminPasswordEyeClosed" class="eye-icon eye-closed" viewBox="0 0 24 24" aria-hidden="true" hidden>
                  <path d="M3 3l18 18"></path>
                  <path d="M10.6 10.6a3 3 0 0 0 3.8 3.8"></path>
                  <path d="M9.9 5.2A10 10 0 0 1 12 5c6 0 9.5 7 9.5 7a15 15 0 0 1-3.1 4"></path>
                  <path d="M6.2 6.6C3.8 8.3 2.5 12 2.5 12s3.5 7 9.5 7a9.7 9.7 0 0 0 4-.8"></path>
                </svg>
              </button>
            </div>
          </label>
          <button class="primary-button" type="submit">登入</button>
          <p id="adminLoginError" class="error-text" aria-live="polite"></p>
        </form>
      </section>
    </main>

    <main id="adminApp" class="admin-shell" hidden>
      <div class="admin-sticky">
        <nav class="admin-tabs" aria-label="管理選單">
          <button class="tab-button active" data-view="deliveries" type="button">配送狀態</button>
          <button class="tab-button" data-view="deleted" type="button">刪除區</button>
          <button class="tab-button" data-view="upload" type="button">匯入 Excel</button>
          <button class="tab-button" data-view="archive" type="button">封存照片</button>
          <button class="tab-button" data-view="users" type="button">帳號管理</button>
          <button id="adminLogout" class="ghost-button admin-logout-button" type="button">登出</button>
        </nav>

        <p id="adminMessage" class="message" role="status" aria-live="polite"></p>
      </div>

      <section id="deliveriesView" class="admin-view">
        <div class="filter-grid delivery-filter-grid">
          <label>
            <span>開始日期</span>
            <input id="filterStartDate" type="date" />
          </label>
          <label>
            <span>結束日期</span>
            <input id="filterEndDate" type="date" />
          </label>
          <label>
            <span>公司名稱</span>
            <select id="filterCompany"></select>
          </label>
          <label>
            <span>物流士</span>
            <select id="filterDriver"></select>
          </label>
          <button id="applyFilters" class="secondary-button" type="button">查詢</button>
          <div id="adminDeliveryCounts" class="filter-counts" role="status" aria-live="polite">
            <span>已達交: 0</span>
            <span>未達交: 0</span>
            <span>共: 0</span>
          </div>
          <button id="toggleAllPhotos" class="secondary-button" type="button">檢視所有照片</button>
          <button id="bulkDeleteFiltered" class="danger-button" type="button">全部刪除</button>
        </div>
        <section id="adminDeliveryList" class="admin-list"></section>
      </section>

      <section id="deletedView" class="admin-view" hidden>
        <div class="filter-grid deleted-filter-grid">
          <label>
            <span>開始日期</span>
            <input id="deletedFilterStartDate" type="date" />
          </label>
          <label>
            <span>結束日期</span>
            <input id="deletedFilterEndDate" type="date" />
          </label>
          <label>
            <span>公司名稱</span>
            <select id="deletedFilterCompany"></select>
          </label>
          <label>
            <span>物流士</span>
            <select id="deletedFilterDriver"></select>
          </label>
          <button id="applyDeletedFilters" class="secondary-button" type="button">查詢</button>
          <div id="deletedDeliveryCounts" class="filter-counts" role="status" aria-live="polite">
            <span>已達交: 0</span>
            <span>未達交: 0</span>
            <span>共: 0</span>
          </div>
          <button id="bulkPermanentDeleteFiltered" class="danger-button" type="button">全部永久刪除</button>
        </div>
        <section id="deletedDeliveryList" class="admin-list deleted-list"></section>
      </section>

      <section id="uploadView" class="admin-view" hidden>
        <div class="admin-panel">
          <h2>上傳配送 Excel</h2>
          <p class="subtle">成功匯入後，暫存的 Excel 檔會自動刪除。</p>
          <div id="dropZone" class="drop-zone">
            <strong>拖放 Excel 檔到這裡</strong>
            <span>或點下方選取多個檔案</span>
          </div>
          <input id="excelFile" type="file" accept=".xlsm,.xlsx" multiple />
          <button id="uploadExcel" class="primary-button" type="button">上傳並匯入</button>
          <pre id="importSummary" class="summary-box"></pre>
        </div>
      </section>

      <section id="archiveView" class="admin-view" hidden>
        <div class="admin-panel">
          <h2>封存照片</h2>
          <label>
            <span>封存日期</span>
            <input id="archiveDate" type="date" />
          </label>
          <button id="archivePhotos" class="primary-button" type="button">開始封存</button>
          <section id="archiveList" class="admin-list"></section>
          <button id="downloadArchives" class="secondary-button" type="button">下載勾選 ZIP</button>
        </div>
      </section>

      <section id="usersView" class="admin-view" hidden>
        <div class="admin-panel">
          <h2>帳號密碼管理</h2>
          <div class="user-form">
            <label>
              <span>使用者名稱</span>
              <input id="userUsername" autocomplete="off" />
            </label>
            <label>
              <span>角色</span>
              <select id="userRole">
                <option value="driver">司機</option>
                <option value="admin">管理人員</option>
              </select>
            </label>
            <label>
              <span>新密碼</span>
              <input id="userPassword" type="password" autocomplete="new-password" />
            </label>
            <label class="toggle-row user-active">
              <input id="userActive" type="checkbox" checked />
              <span>啟用</span>
            </label>
            <button id="saveUser" class="primary-button" type="button">儲存帳號</button>
          </div>
        </div>
        <section id="userList" class="admin-list"></section>
      </section>
    </main>

    <dialog id="adminPhotoDialog" class="photo-dialog">
      <div class="dialog-header">
        <strong id="adminPhotoTitle"></strong>
        <div class="photo-tools">
          <button id="adminPhotoRotateLeft" class="secondary-button photo-icon-button" type="button" aria-label="左轉90度" title="左轉90度">
            <span aria-hidden="true">&#8634;</span>
          </button>
          <button id="adminPhotoRotateRight" class="secondary-button photo-icon-button" type="button" aria-label="右轉90度" title="右轉90度">
            <span aria-hidden="true">&#8635;</span>
          </button>
          <span id="adminPhotoRotateError" class="photo-rotate-error" aria-live="polite"></span>
        </div>
        <form class="dialog-close-form" method="dialog">
          <button id="closeAdminPhoto" class="ghost-button" type="submit">關閉</button>
        </form>
      </div>
      <div id="adminPhotoViewport" class="photo-viewport">
        <img id="adminPhotoPreview" alt="達交照片" />
      </div>
    </dialog>

    <script src="/static/photo-viewer.js"></script>
    <script src="/static/admin-photo-view.js"></script>
    <script src="/static/admin-filter-options.js"></script>
    <script src="/static/admin-operation-state.js"></script>
    <script src="/static/admin-api.js"></script>
    <script src="/static/pwa.js" defer></script>
    <script src="/static/admin.js" defer></script>
  </body>
</html>
