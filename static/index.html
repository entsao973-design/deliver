<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <title>配送存證平台</title>
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#146c63" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="配送存證平台" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="application-name" content="配送存證平台" />
    <link rel="icon" type="image/png" sizes="192x192" href="/static/icons/icon-192.png" />
    <link rel="apple-touch-icon" href="/static/icons/icon-192.png" />
    <script src="/static/home-redirect.js"></script>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section id="loginScreen" class="screen login-screen">
        <div class="brand-block">
          <h1>配送存證平台</h1>
          <p>物流士登入</p>
        </div>

        <form id="loginForm" class="panel">
          <label>
            <span>帳號</span>
            <input id="username" name="username" autocomplete="username" required />
          </label>
          <label>
            <span>密碼</span>
            <div class="password-field">
              <input id="password" name="password" type="password" autocomplete="current-password" required />
              <button id="togglePassword" class="password-toggle" type="button" aria-label="顯示密碼" aria-pressed="false">
                <svg id="passwordEyeOpen" class="eye-icon eye-open" viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M2.5 12s3.5-6 9.5-6 9.5 6 9.5 6-3.5 6-9.5 6-9.5-6-9.5-6Z"></path>
                  <circle cx="12" cy="12" r="3"></circle>
                </svg>
                <svg id="passwordEyeClosed" class="eye-icon eye-closed" viewBox="0 0 24 24" aria-hidden="true" hidden>
                  <path d="M3 3l18 18"></path>
                  <path d="M10.6 10.6a3 3 0 0 0 3.8 3.8"></path>
                  <path d="M9.9 5.2A10 10 0 0 1 12 5c6 0 9.5 7 9.5 7a15 15 0 0 1-3.1 4"></path>
                  <path d="M6.2 6.6C3.8 8.3 2.5 12 2.5 12s3.5 7 9.5 7a9.7 9.7 0 0 0 4-.8"></path>
                </svg>
              </button>
            </div>
          </label>
          <label>
            <span>車號</span>
            <input id="vehicleNo" name="vehicleNo" list="vehicleOptions" autocomplete="off" placeholder="載入車號中..." />
            <datalist id="vehicleOptions"></datalist>
          </label>
          <label>
            <span>車號選擇</span>
            <select id="vehicleSelect" class="vehicle-select">
              <option value="">載入車號中...</option>
            </select>
          </label>
          <label class="toggle-row remember-row">
            <input id="rememberLogin" type="checkbox" />
            <span>記住帳號密碼與車號</span>
          </label>
          <button class="primary-button" type="submit">登入</button>
          <p id="loginError" class="error-text" aria-live="polite"></p>
        </form>
      </section>

      <section id="deliveryScreen" class="screen delivery-screen" hidden>
        <header class="top-bar">
          <div class="route-info">
            <p id="routeDate" class="eyebrow"></p>
            <h1 id="routeTitle"></h1>
            <p id="driverName" class="subtle"></p>
          </div>
          <section id="datePanel" class="date-panel" hidden>
            <label>
              <span>配送日期</span>
              <select id="dateSelect"></select>
            </label>
          </section>
          <div class="top-actions">
            <button id="refreshButton" class="secondary-button" type="button">重新整理</button>
            <button id="logoutButton" class="ghost-button" type="button">登出</button>
          </div>
        </header>

        <section class="summary-strip">
          <div class="summary-counts">
            <div>
              <strong id="openCount">0</strong>
              <span>未達交</span>
            </div>
            <div>
              <strong id="doneCount">0</strong>
              <span>已達交</span>
            </div>
          </div>
          <div class="summary-toggles">
            <label class="toggle-row">
              <input id="hideDoneToggle" type="checkbox" checked />
              <span>隱藏已達交</span>
            </label>
            <label class="toggle-row photo-clarity-toggle">
              <input id="photoClarityToggle" type="checkbox" checked />
              <span>拍照後檢查清晰度</span>
            </label>
            <label class="toggle-row">
              <input id="showAllPhotosToggle" type="checkbox" />
              <span>檢視所有照片</span>
            </label>
          </div>
          <div class="summary-actions">
            <button id="smartPhotoButton" class="secondary-button" type="button">定位達交</button>
            <button id="scanInvoiceButton" class="secondary-button" type="button">掃號達交</button>
          </div>
        </section>

        <div class="toolbar" hidden>
          <button id="reloadButton" class="secondary-button" type="button">重新匯入</button>
        </div>

        <p id="queueStatus" class="queue-status" role="status" aria-live="polite"></p>
        <div id="message" class="message" role="status" aria-live="polite"></div>
        <section id="deliveryList" class="delivery-list"></section>
      </section>
    </main>

    <input id="photoInput" type="file" accept="image/*" capture="environment" hidden />
    <input id="scanInvoiceInput" type="file" accept="image/*" capture="environment" hidden />

    <dialog id="photoClarityDialog" class="photo-clarity-dialog">
      <p>照片可能模糊，重拍或仍然接受。</p>
      <div class="dialog-actions photo-clarity-actions">
        <button id="photoClarityRetake" class="secondary-button" type="button">重拍</button>
        <button id="photoClarityAccept" class="primary-button" type="button">仍然接受</button>
      </div>
    </dialog>

    <dialog id="scanInvoiceDialog" class="scan-invoice-dialog">
      <div class="dialog-header">
        <strong>掃號達交</strong>
        <button id="closeScanInvoiceButton" class="ghost-button" type="button">關閉</button>
      </div>
      <div id="scanInvoiceViewport" class="scan-invoice-viewport">
        <video id="scanInvoiceVideo" class="scan-invoice-video" autoplay playsinline muted></video>
        <div id="scanInvoiceFrame" class="scan-invoice-frame" aria-hidden="true"></div>
      </div>
      <div class="scan-invoice-zoom" aria-label="掃號縮放">
        <button id="scanInvoiceZoomOutButton" class="secondary-button scan-invoice-zoom-button" type="button" aria-label="縮小" title="縮小">-</button>
        <input id="scanInvoiceZoomSlider" type="range" min="1" max="3" step="0.1" value="1" aria-label="掃號縮放比例" />
        <button id="scanInvoiceZoomInButton" class="secondary-button scan-invoice-zoom-button" type="button" aria-label="放大" title="放大">+</button>
        <span id="scanInvoiceZoomValue" class="scan-invoice-zoom-value">1.0x</span>
      </div>
      <div class="scan-invoice-actions">
        <button id="captureScanInvoiceButton" class="primary-button" type="button">拍照掃號</button>
      </div>
      <canvas id="scanInvoiceCanvas" hidden></canvas>
    </dialog>

    <dialog id="photoDialog" class="photo-dialog">
      <div class="dialog-header">
        <strong id="photoTitle"></strong>
        <button id="closePhotoButton" class="ghost-button" type="button">關閉</button>
      </div>
      <div id="photoViewport" class="photo-viewport">
        <img id="photoPreview" alt="達交照片" />
      </div>
      <div class="dialog-actions">
        <button id="retakeButton" class="primary-button" type="button">再次拍照</button>
      </div>
    </dialog>

    <dialog id="smartPhotoDialog" class="smart-photo-dialog">
      <div class="dialog-header">
        <strong id="smartPhotoTitle">定位達交</strong>
        <button id="closeSmartPhotoButton" class="ghost-button" type="button">關閉</button>
      </div>
      <div class="smart-photo-status" role="group" aria-label="達交狀態">
        <label class="toggle-row">
          <input id="smartPhotoStatusNormal" type="radio" name="smartPhotoStatus" value="normal" checked />
          <span>正常達交</span>
        </label>
        <label class="toggle-row">
          <input id="smartPhotoStatusAbnormal" type="radio" name="smartPhotoStatus" value="abnormal" />
          <span>異常達交</span>
        </label>
      </div>
      <div id="smartPhotoCandidates" class="smart-photo-candidates"></div>
    </dialog>

    <script src="/static/photo-viewer.js"></script>
    <script src="/static/offline-upload-queue.js"></script>
    <script src="/static/driver-api.js"></script>
    <script src="/static/smart-photo.js"></script>
    <script src="/static/driver-smart-delivery.js"></script>
    <script src="/static/scan-invoice.js"></script>
    <script src="/static/driver-scan-delivery.js"></script>
    <script src="/static/photo-quality.js"></script>
    <script src="/static/pwa.js" defer></script>
    <script src="/static/app.js" defer></script>
  </body>
</html>
